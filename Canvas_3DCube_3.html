<!DOCTYPE html>
<html>
  <head>
    <title>
      Canvas 3D Cube : V3
    </title>
    <style>
      body {
        margin: 0;
      }
      canvas {
        position: absolute;
        margin: 0;
        height: 100dvh;
        width: 100dvw;
      }
    </style>
  </head>
  <body>
    <!-- ।। ॐ नमः शिवाय ।। -->
    <canvas id="canvas"></canvas>
    <script>
      // ।। ॐ नमः शिवाय ।। \\
      
      // !! global !! \\
      const dpr = window.devicePixelRatio;
      const h = window.innerHeight; // viewport height;
      const w = window.innerWidth; // viewport width;
      const uh = h / 100; // unit height;
      const uw = w / 100; // unit height;
      
      // !! setup !! \\
      /** @type {HTMLCanvasElement} */
      const canvas = document.getElementById('canvas');
      canvas.width = w;
      canvas.height = h;
      /** @type {CanvasRenderingContext2D} */
      const brush = canvas.getContext('2d');
      brush.translate(w/2, h/2);
      
      class Cube {
        constructor() {
          // !! cube setup !! \\
          this.side = 100;
          this.brushWidth = 2;
          this.baseVertices = [
            [-1, -1, -1], // vertex 0
            [1, -1, -1], // vertex 1
            [1, -1, 1], // vertex 2
            [-1, -1, 1], // vertex 3
            [-1, 1, -1], // vertex 4
            [1, 1, -1], // vertex 5
            [1, 1, 1], // vertex 6
            [-1, 1, 1] // vertex 7
          ];
          this.cubeEdges = [
            [0, 1], [1, 2], [2, 3], [3, 0], // down face
            [4, 5], [5, 6], [6, 7], [7, 4], // top face
            [0, 4], [1, 5], [2, 6], [3, 7], // lines
          ];
          this.cp = 700; // camera/observer perspective;
          this.edgeColour = 'rgba(0, 255, 255, 0.45)';
          // !! rotation setup !! \\
          this.totalX = 0;
          this.totalY = 0;
          this.isSwiping = false;
          // << animatiom setup !! \\
          this.lastTime = performance.now();
          requestAnimationFrame((currentTime) => { this.animate(currentTime) });
          this.resize();
          this.rotate();
        }
        // << helper function: converts 3D coordinate to 2D coordinate using z & perspective >> \\
        project3Dto2D(coordinate) {
          const x = (coordinate[0] * this.cp)/(coordinate[2] + this.cp);
          const y = (coordinate[1] * this.cp)/(coordinate[2] + this.cp);
          return [x, y];
        }
        // << helper function: resizes side length of cube on the basis of user's 2 fingers' interaction; ensures side stays within 40 to 140 range >> \\
        resize() {
          let startDistance = 0;
          let startLength = 0;
          const getDistance = (p1, p2) => {
            const dx = p2.clientX - p1.clientX;
            const dy = p2.clientY - p1.clientY;
            return Math.hypot(dx, dy);
          };
          document.addEventListener('touchstart', (e) => {
            if (e.targetTouches.length !== 2) return;
            startDistance = getDistance(e.targetTouches[0], e.targetTouches[1]);
            startLength = this.side;
          });
          document.addEventListener('touchmove', (e) => {
            if (e.targetTouches.length !== 2) return;
            e.preventDefault();
            const currentDistance = getDistance(e.targetTouches[0], e.targetTouches[1]);
            const newLength = (currentDistance/startDistance) * startLength;
            this.side = Math.max(40, Math.min(140, newLength)); // 40 <= side <= 140;
            this.brushWidth = this.side / 50; // width is 2% of side;
          }, { passive: false });
        }
        // << helper function: rotates cube on user's swipes >> \\
        rotate() {
          let startX = 0;
          let startY = 0;
          document.addEventListener('touchstart', (e) => {
            this.isSwiping = true;
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
          });
          document.addEventListener('touchmove', (e) => {
            if (!this.isSwiping) return;
            e.preventDefault();
            const endX = e.touches[0].clientX;
            const endY = e.touches[0].clientY;
            // << get distances >> \\
            const dx = endX - startX;
            const dy = endY - startY;
            // << update angles >> \\
            this.totalX -= dx*0.0005;
            this.totalY -= dy*0.0005;
          }, { passive: false });
          document.addEventListener('touchend', () => {
            if (this.isSwiping) {
              this.isSwiping = false;
            }
          });
        }
        // << helper function: applies scaling using side length and rotation transforms using accumulated angles & returns a temporary vertex array >> \\
        getTransformedVertices() {
          // << scale >> \\
          const newVertices = [];
          for (let k=0; k<this.baseVertices.length; k++) {
            const array = [];
            for (let i=0; i<3; i++) {
              array.push(this.baseVertices[k][i] * this.side);
            }
            newVertices.push(array);
          }
          // << rotate >> \\
          this.cosX = Math.cos(this.totalX);
          this.sinX = Math.sin(this.totalX);
          
          this.cosY = Math.cos(this.totalY);
          this.sinY = Math.sin(this.totalY);
          
          const rotatedVertices = [];
          for (let k=0; k<newVertices.length; k++) {
            const x = newVertices[k][0];
            const y = newVertices[k][1];
            const z = newVertices[k][2];
            // << apply x rotation >> \\
            const y1 = y*this.cosX - z*this.sinX;
            const z1 = y*this.sinX + z*this.cosX;
            // << apply y rotation >> \\
            const x1 = x*this.cosY - z1*this.sinY;
            const z2 = x*this.sinY + z1*this.cosY;
            rotatedVertices.push([x1, y1, z2]);
          }
          return rotatedVertices;
        }
        // << actual draw function: takes a temporary array of transformed vertices and draws them >> \\
        draw(transformedVertices) {
          brush.beginPath();
          brush.strokeStyle = this.edgeColour;
          brush.lineWidth = this.brushWidth;
          for (let k=0; k<this.cubeEdges.length; k++) {
            // << get vertex location >> \\
            const startV = transformedVertices[this.cubeEdges[k][0]];
            const endV = transformedVertices[this.cubeEdges[k][1]];
            // << get vertices >> \\
            const start = this.project3Dto2D(startV);
            const end = this.project3Dto2D(endV);
            // << draw >> \\
            brush.moveTo(start[0], start[1]);
            brush.lineTo(end[0], end[1]);
          }
          brush.stroke();
        }
        // << animation function: updates angles & animates at 60FPS >> \\
        animate(currentTime) {
          const elapsed = currentTime - this.lastTime;
          if (elapsed >= 16.66) {
            if (!this.isSwiping) {
              this.totalX += 0.005;
              this.totalY -= 0.015;
            }
            brush.clearRect(-w/2, -h/2, w, h);
            this.draw(this.getTransformedVertices());
            this.lastTime = currentTime - (elapsed % 16.66);
          }
          requestAnimationFrame((currentTime) => { this.animate(currentTime) });
        }
      }
      
      class PerformanceAccountant {
        constructor() {
          this.lastTime = performance.now();
          this.fps = 0;
          requestAnimationFrame((currentTime) => { this.logFPS(currentTime) });
        }
        logFPS(currentTime) {
          this.fps++;
          const elapsed = currentTime - this.lastTime;
          if (elapsed >= 1000) {
            console.log(`Frame rate: ${this.fps}`);
            this.fps = 0;
            this.lastTime = currentTime - (elapsed % 1000);
          }
          requestAnimationFrame((currentTime) => { this.logFPS(currentTime) });
        }
      }
      
      window.addEventListener('DOMContentLoaded', () => {
        const cube = new Cube();
        const perf = new PerformanceAccountant();
      });
      
      // ++ DEVELOPER'S NOTES ++ \\
      /*
      • cube rotation uses a single source of truth of unit cube from class constructor and transforms it on the basis of cube's side length & accumulated angles to render each frame;
      • utilizes requestAnimationFrame (rAF) to maintain consistent hardware sync, while at the same employs custom math to ensure cube updates at a fixed 60FPS;
      • original base vertices remain static & isolated from render changes;
      • mobile/tablet touch support: swipe with 1 finger to rotate cube, pinch-and-zoom with 2 fingers to scale cube's size;
      • PerformanceAccountant class manually tracks and logs frame rate to check code efficiency;
      */
    </script>
  </body>
</html>
