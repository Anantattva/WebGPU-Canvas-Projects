<!DOCTYPE html>
<html>
  <head>
    <title>
      Custom Linear Gradients Math
    </title>
    <style>
      body {
        margin: 0;
        height: 100dvh;
        width: 100dvw;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 7%;
        text-align: center;
        background: rgba(0, 255, 255, 0.1);
      }
      h1 {
        text-align: center;
        font-size: 6dvw;
        font-family: 'Times New Roman';
      }
      canvas {
        background: white;
        width: 75dvw;
        height: 15dvw;
        box-shadow: 0 0 12px 1dvw rgba(0, 0, 0, 0.3);
      }
    </style>
  </head>
  <body>
    <h1>Custom Linear Gradients Math</h1>
    <canvas id="canvas"></canvas>
    <canvas id="canvas2"></canvas>
    <script>
      // ।। ॐ नमः शिवाय ।। \\
      // !! canvas 1 !! \\
      // !! get elements !! \\
      const canvas = document.getElementById('canvas');
      const brush = canvas.getContext('2d');
      // !! set !! \\
      canvas.width = 500;
      canvas.height = 100;
      // !! colours !! \\
      const c1 = 'rgba(255, 255, 0, 1)'; // yellow
      const c2 = 'rgba(255, 0, 255, 1)'; // magenta
      // !! extracting function !! \\
      function extractRGBAValues(rgbaString) {
        const regex = /\d+\.?\d*/g;
        const array = rgbaString.match(regex);
        const values = array ? array.map(Number) : [];
        return values;
      }
      // !! custom loop !! \\
      const start = performance.now();
      for (let k=0; k<500; k++) {
        const r = ((255*(500-k))+(255*k))/500;
        const g = ((255*(500-k))+(0*k))/500;
        const b = ((0*(500-k))+(255*k))/500;
        const a = ((1*(500-k))+(1*k))/500;
        brush.fillStyle = `rgba(${r}, ${g}, ${b}, ${a})`;
        brush.fillRect(k, 0, 1, 100);
      }
      const end = performance.now();
      console.log(`Time for custom.loop: ${end-start}ms.`);
    </script>
    <script>
      // ।। ॐ नमः शिवाय ।। \\
      // !! canvas 2 !! \\
      // !! get elements !! \\
      const canvas2 = document.getElementById('canvas2');
      const brush2 = canvas2.getContext('2d');
      // !! set !! \\
      canvas2.width = 500;
      canvas2.height = 100;
      // !! in-built method !! \\
      // !! lightning fast !! \\
      const start2 = performance.now();
      const gradient = brush2.createLinearGradient(0, 0, 500, 0); // (startX, startY, endX, endY);
      gradient.addColorStop(0, 'lime');
      gradient.addColorStop(1, 'cyan');
      // !! draw !! \\
      brush2.fillStyle = gradient;
      brush2.fillRect(0, 0, 500, 100);
      const end2 = performance.now();
      console.log(`Time for in-built method: ${end2-start2}ms.`);
    </script>
  </body>
</html>
